services:
  webhook-bridge:
    # 默认使用 Docker Hub 镜像
    image: iruiiii/webhook-bridge:latest
    # 本地构建（取消注释以下两行，注释上面的 image）
    # build: .
    # image: webhook-bridge:latest
    container_name: webhook-bridge
    restart: unless-stopped
    environment:
      # 飞书机器人 Webhook 地址（必填）
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL}
      # 飞书机器人加签密钥（可选）
      FEISHU_SECRET: ${FEISHU_SECRET:-}
      # 时区偏移量（默认东八区）
      TZ_OFFSET: ${TZ_OFFSET:-8}
    volumes:
      # 挂载告警卡片模板（支持热更新，修改后下次告警自动生效）
      - ./template.json:/app/template.json:ro
    ports:
      - "${WEBHOOK_BRIDGE_PORT:-5000}:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
